<!doctype html>
<html lang="es">
<head>

  <meta name="viewport" content="width=device-width, initial-scale=1">

  <meta name="theme-color" content="#123d46">
  <meta property="og:title" content="Promo Plasma Fibroblast 40% OFF">
  <meta property="og:description" content="Elige tu zona de inter&eacute;s y solicita valoraci&oacute;n por WhatsApp.">
  <meta property="og:image" content="https://figurarostro.life/servicio-fibroblast.jpg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --teal: #20b8ae;
      --teal-dark: #127a7d;
      --deep: #123d46;
      --ink: #17363d;
      --muted: #60797f;
      --line: #d8e9e7;
      --soft: #effbfa;
      --gold: #d5ad52;
      --white: #ffffff;
      --shadow: 0 26px 70px rgba(18, 61, 70, .18);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Inter, Arial, sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at 50% 0%, rgba(32, 184, 174, .22), transparent 34%),
        linear-gradient(180deg, #f4fffd 0%, #ffffff 58%, #fff9ef 100%);
      display: grid;
      place-items: center;
      padding: 22px;
      overflow-x: hidden;
    }

    a { color: inherit; text-decoration: none; }

    .wrap {
      width: calc(100vw - 44px);
      max-width: 460px;
      min-width: 0;
    }

    .logo {
      width: 100%;
      display: flex;
      justify-content: center;
      margin-bottom: 14px;
    }

    .logo-inner {
      width: 100%;
      min-height: 64px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 26px;
      background: linear-gradient(135deg, rgba(18, 61, 70, .98), rgba(18, 122, 125, .96));
      box-shadow: 0 18px 45px rgba(18, 61, 70, .14);
    }

    .logo img {
      width: 118px;
      height: auto;
      display: block;
    }

    .card {
      overflow: hidden;
      border: 1px solid rgba(18, 122, 125, .18);
      border-radius: 34px;
      background: var(--white);
      box-shadow: var(--shadow);
    }

    .promo-image {
      position: relative;
      min-height: 560px;
      background: var(--deep);
      isolation: isolate;
    }

    .promo-image::after {
      content: "";
      position: absolute;
      inset: 0;
      z-index: 1;
      background:
        linear-gradient(180deg, rgba(18, 61, 70, .02) 0%, rgba(18, 61, 70, .06) 42%, rgba(18, 61, 70, .82) 100%);
      pointer-events: none;
    }

    .promo-image img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .badge {
      position: absolute;
      top: 18px;
      right: 18px;
      z-index: 2;
      width: 118px;
      height: 118px;
      display: grid;
      place-items: center;
      border: 7px solid rgba(255, 255, 255, .92);
      border-radius: 999px;
      background: linear-gradient(135deg, #ffffff, #e8fbf9);
      color: var(--deep);
      text-align: center;
      box-shadow: 0 18px 42px rgba(0, 0, 0, .18);
      font-weight: 900;
    }

    .badge strong {
      display: block;
      font-size: 38px;
      line-height: .9;
    }

    .badge span {
      display: block;
      margin-top: 5px;
      color: var(--teal-dark);
      font-size: 12px;
      text-transform: uppercase;
    }

    .promo-caption {
      position: absolute;
      left: 18px;
      right: 18px;
      bottom: 18px;
      z-index: 2;
      padding: 18px;
      border: 1px solid rgba(255, 255, 255, .22);
      border-radius: 24px;
      background: rgba(18, 61, 70, .72);
      backdrop-filter: blur(12px);
      color: white;
    }

    .promo-caption h1 {
      margin: 0;
      font-size: clamp(30px, 8vw, 44px);
      line-height: 1;
      letter-spacing: 0;
    }

    .promo-caption p {
      margin: 9px 0 0;
      color: rgba(255, 255, 255, .82);
      line-height: 1.45;
      font-size: 15px;
      font-weight: 600;
    }

    .controls {
      display: grid;
      gap: 12px;
      padding: 18px;
      background:
        radial-gradient(circle at 0% 0%, rgba(32, 184, 174, .14), transparent 36%),
        #ffffff;
    }

    label {
      color: var(--deep);
      font-size: 13px;
      font-weight: 900;
      text-transform: uppercase;
    }

    select {
      width: 100%;
      min-height: 58px;
      padding: 0 16px;
      border: 1px solid var(--line);
      border-radius: 18px;
      background: var(--soft);
      color: var(--ink);
      font: inherit;
      font-weight: 800;
      outline: none;
      cursor: pointer;
    }

    select:focus {
      border-color: var(--teal);
      box-shadow: 0 0 0 4px rgba(32, 184, 174, .16);
    }

    .wa-button {
      min-height: 62px;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 0;
      border-radius: 999px;
      color: white;
      background: linear-gradient(135deg, var(--teal), var(--teal-dark));
      box-shadow: 0 18px 40px rgba(32, 184, 174, .28);
      font: inherit;
      font-weight: 900;
      cursor: pointer;
      transition: transform .18s ease, box-shadow .18s ease;
    }

    .wa-button:hover {
      transform: translateY(-2px);
      box-shadow: 0 22px 48px rgba(32, 184, 174, .34);
    }

    .simple-link {
      display: flex;
      justify-content: center;
      margin-top: 14px;
      color: var(--teal-dark);
      font-weight: 900;
      font-size: 14px;
      text-align: center;
    }

    .simple-link span {
      padding: 12px 16px;
      border: 1px solid rgba(18, 122, 125, .18);
      border-radius: 999px;
      background: rgba(255, 255, 255, .72);
    }

    @media (max-width: 520px) {
      body {
        padding: 14px;
        align-items: start;
        justify-items: center;
      }

      .wrap {
        width: calc(100vw - 28px);
        max-width: 362px;
      }

      .logo-inner {
        min-height: 58px;
        border-radius: 24px;
      }

      .logo img {
        width: 108px;
      }

      .card {
        border-radius: 28px;
      }

      .promo-image {
        min-height: 540px;
      }

      .badge {
        width: 104px;
        height: 104px;
        border-width: 6px;
      }

      .badge strong {
        font-size: 34px;
      }

      .promo-caption {
        left: 14px;
        right: 14px;
        bottom: 14px;
        padding: 16px;
      }
    }

    @media (max-width: 380px) {
      .promo-image {
        min-height: 510px;
      }

      .promo-caption h1 {
        font-size: 29px;
      }
    }
  </style>
</head>
<body>
  <main class="wrap">

        <div class="badge">
          <div>
            <strong>40%</strong>

        </div>

        </div>
      </div>

  <script>
    document.getElementById("promoForm").addEventListener("submit", function (event) {
      event.preventDefault();
      const zona = document.getElementById("zona").value;
      const mensaje = encodeURIComponent([
        "Hola, vi la promocion 40% OFF de Plasma Fibroblast.",
        "Zona de interes: " + zona,
        "Quiero chatear para saber si aplico."

    });

</body>
</html>
